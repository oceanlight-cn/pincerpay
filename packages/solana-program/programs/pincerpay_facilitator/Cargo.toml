[package]
name = "pincerpay-facilitator"
version = "0.1.0"
description = "PincerPay on-chain facilitator for USDC settlement"
edition = "2021"

[lib]
crate-type = ["cdylib", "lib"]
name = "pincerpay_facilitator"

[features]
no-entrypoint = []
no-idl = []
no-log-ix-name = []
cpi = ["no-entrypoint"]
default = []

[dependencies]
anchor-lang = "0.30.1"
anchor-spl = { version = "0.30.1", features = ["token_interface"] }
