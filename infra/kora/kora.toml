# PincerPay Kora signer node configuration
# Solana devnet — switch token addresses for mainnet

[kora]
rate_limit = 100

[kora.auth]
# API key auth is handled via KORA_API_KEY env var in the facilitator;
# Kora itself uses the signers.toml for auth. Leave empty for now.

[kora.cache]
enabled = false
default_ttl = 60

[kora.enabled_methods]
liveness = true
estimate_transaction_fee = true
get_supported_tokens = true
sign_transaction = true
sign_and_send_transaction = true
transfer_transaction = true
get_blockhash = true
get_config = true
get_payer_signer = true

[kora.usage_limit]
enabled = false

[validation]
max_allowed_lamports = 1000000
max_signatures = 10
price_source = "Mock"           # Use "Jupiter" for mainnet
allow_durable_transactions = false

allowed_programs = [
    "11111111111111111111111111111111",              # System Program
    "TokenkegQfeZyiNwAJbNbGKPFXCWuBvf9Ss623VQ5DA",  # Token Program
    "ATokenGPvbdGVxr1b2hvZbsiqW5xWH25efTNsLJA8knL",  # Associated Token Program
    "ComputeBudget111111111111111111111111111111",     # Compute Budget Program
    "MemoSq4gqABAXKb96qnH8TysNcWxMyWCqXgDLGmfcHr",  # Memo Program v2
]

# Devnet USDC (use EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v for mainnet)
allowed_tokens = [
    "4zMMC9srt5Ri5X14GAgXhaHii3GnPAEERYPJgZJDncDU",  # USDC devnet
]

# Allow agents to pay gas fees in USDC
allowed_spl_paid_tokens = [
    "4zMMC9srt5Ri5X14GAgXhaHii3GnPAEERYPJgZJDncDU",  # USDC devnet
]

disallowed_accounts = []

[validation.fee_payer_policy]

[validation.fee_payer_policy.system]
allow_transfer = true
allow_assign = true
allow_create_account = true
allow_allocate = true

[validation.fee_payer_policy.system.nonce]
allow_initialize = false
allow_advance = false
allow_authorize = false
allow_withdraw = false

[validation.fee_payer_policy.spl_token]
allow_transfer = false          # Fee payer should NOT transfer SPL tokens
allow_burn = false
allow_close_account = true      # Needed for ATA cleanup
allow_approve = false
allow_revoke = false
allow_set_authority = false
allow_mint_to = false
allow_initialize_mint = false
allow_initialize_account = true # Needed to create ATAs
allow_initialize_multisig = false
allow_freeze_account = false
allow_thaw_account = false

[validation.fee_payer_policy.token_2022]
allow_transfer = false
allow_burn = false
allow_close_account = true
allow_approve = false
allow_revoke = false
allow_set_authority = false
allow_mint_to = false
allow_initialize_mint = false
allow_initialize_account = true
allow_initialize_multisig = false
allow_freeze_account = false
allow_thaw_account = false

[validation.price]
type = "free"                   # Use "margin" with margin = 0.1 for mainnet

[validation.token2022]
blocked_mint_extensions = []
blocked_account_extensions = []

[metrics]
enabled = true
endpoint = "/metrics"
port = 8080
scrape_interval = 60

[metrics.fee_payer_balance]
enabled = true
expiry_seconds = 30
